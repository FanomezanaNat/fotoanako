spring:
  application:
    name: fotoanako

  datasource:
    url: jdbc:h2:mem:fotoanako;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

fotoanako:
  jwt:
    secret: fotoanako-training-secret-key-change-me-in-production-please-2026
    expiration-ms: 3600000
